apiVersion: backstaige.io/v1alpha1
kind: DockerCluster
metadata:
  name: hello-world
  namespace: default
spec:
  parameters:
    id: hello-world
    kubernetesVersion: "v1.31.4"
    controlPlane:
      replicas: 1
    workers:
      replicas: 1
    podCIDR: "10.244.0.0/16"
    serviceCIDR: "10.96.0.0/12"
    cni: calico
  writeConnectionSecretToRef:
    name: hello-world-kubeconfig
